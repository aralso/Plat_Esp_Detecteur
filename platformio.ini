; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:upesy_wroom]
platform = espressif32
project_name = Detecteur
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_eol = CRLF
monitor_filters = esp32_exception_decoder
board_build.partitions = src/partitions.csv

;lib_ldf_mode = chain+

build_flags = 
  -Wl,-Map,firmware.map
  -D CONFIG_BT_ENABLED=0
  -D CONFIG_BLE_ENABLED=0

lib_deps =
  https://github.com/br3ttb/Arduino-PID-Library.git
  adafruit/DHT sensor library @ ^1.4.3
  bblanchon/ArduinoJson
  ClosedCube/ClosedCube HDC1080 @ ^1.1.1
  ESP32Async/AsyncTCP 
  ESP32Async/ESPAsyncWebServer
  https://github.com/gilmaimon/ArduinoWebsockets.git